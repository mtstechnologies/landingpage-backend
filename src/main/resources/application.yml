spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration/portfolio
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    com.portfolio.backend: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
