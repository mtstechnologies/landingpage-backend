spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${JPA_FORMAT_SQL:false}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration/portfolio
    baseline-on-migrate: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.portfolio.backend: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}

# Segurança
portfolio:
  security:
    cors:
      allowed-origins: ${PORTFOLIO_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  admin:
    username: ${PORTFOLIO_ADMIN_USER:admin}
    password: ${PORTFOLIO_ADMIN_PASSWORD:troque-em-producao}

# Actuator (preparação para SPEC-009)
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    info:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
  info:
    app:
      enabled: true
    java:
      enabled: true

info:
  app:
    name: Portfolio Backend API
    description: API RESTful de suporte ao portfólio de engenharia de software
    version: 1.0.0
    author: Michael Trindade da Silva
    contact: michaeltrindadedasilva@gmail.com
